name: Atualizar prazos

on:
  schedule:
    - cron: "0 * * * *" # roda a cada hora
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Rodar script
        run: node scripts/update-deadlines.js

      - name: Commit mudanças
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Atualizando prazos automaticamente" || exit 0
          git push
